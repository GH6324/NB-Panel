# NB面板 Docker Compose 配置
# 开源: https://github.com/lima-droid/NB-Panel

services:
  nbpanel:
    image: ghcr.io/lima-droid/nb-panel:latest
    container_name: nbpanel
    ports:
      - "4000:4000"
    volumes:
      - ./db:/app/db
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
